name: Publish to GitHub Packages

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  release:
    types: [created]

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine hatchling

      - name: Build package
        run: python -m build

      - name: Configure pip for GitHub Packages
        run: |
          mkdir -p ~/.config/pip
          cat > ~/.config/pip/pip.conf <<EOF
          [global]
          extra-index-url = https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@pypi.pkg.github.com/Sementesmana/simple/
          EOF

      - name: Publish to GitHub Packages
        env:
          TWINE_USERNAME: ${{ github.actor }}
          TWINE_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
          TWINE_REPOSITORY_URL: https://pypi.pkg.github.com/Sementesmana/
        run: twine upload --skip-existing dist/*.tar.gz dist/*.whl

      - name: Open PR in plugin-mana-skills (TODO)
        if: false  # ativar quando plugin-mana-skills existir
        run: |
          echo "TODO: abrir PR automático em Sementesmana/plugin-mana-skills"
          echo "Adicionando/atualizando _kits/skills/habilidades/<nome>/SKILL.md"
          # gh CLI ou script Python via PR API
