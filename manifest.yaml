# Manifesto da Habilidade — Maná Builder
# Primeira habilidade real do portfólio (piloto do fluxo).
# Ver: ADR 2026-06-26-mana-builder-matriz-cobertura (vault)

# Identidade
nome: mana-habilidade-pseudonimizar-pii
descricao: Pseudonimização defensiva de PII (nomes próprios, CPF, CNPJ, sequências longas, filenames) antes de enviar payload pra LLM ou API de terceiros. Permite desmascarar a resposta antes de salvar/exibir.
categoria: habilidade        # habilidade | sdk | template | hub | agente | governanca

# Ownership
owner: xayer-mana            # piloto do fluxo de habilidades; pode ser transferido depois
codeowners: [xayer-mana]

# Versão (gerenciada por GitHub Actions; bumpar manualmente em PR)
versao-atual: 0.1.0
ultima-revisao: 2026-07-04

# Status do ciclo de vida
status: alpha               # alpha → beta após migrar 1 agente real → producao após 2
notas-de-migracao:
  - "2026-07-04: 1º consumidor EM DEPLOY — agente-documentos Aba 2 v2 (ADR 2026-07-04-aba2-v2-deterministica-lake-sem-check-cpr): habilidade no requirements.txt; pipeline usa PIIPseudonimizador com fallback local gracioso se import falhar. Ao validar em prod, mover agente-documentos pra consumidores (candidato ao gate alpha→beta). Aba 1 (_pseudonimizar_filename inline) ainda NÃO migrada."

# Matriz 3D (Maná Builder)
# Habilidade transversal de segurança/LGPD — não atrelada a cadeia ou hierarquia.
cadeia: transversal         # apoio | negocio | gestao | transversal
hierarquia: []              # transversal
tipo_artefato: habilidade

# Relações
substitui-copias-em:
  - agente-comite-credito   # app/integrations/_pseudonimizador.py (113 linhas)
  - agente-documentos       # _pseudonimizar_filename inline em agente_documentos.py
consumidores: []            # atualizar quando agentes migrarem (Fase 2)
depende-de: []              # só stdlib

# Distribuição
# GitHub Packages PyPI foi descontinuado em 2024. Padrão Maná: instalar via tag git
# (pip install git+https://github.com/Sementesmana/<repo>.git@v<X.Y.Z>).
registry: git-tag
url-pacote: ""    # N/A — não há PyPI registry
url-repo: https://github.com/Sementesmana/mana-habilidade-pseudonimizar-pii
url-instalacao: "git+https://github.com/Sementesmana/mana-habilidade-pseudonimizar-pii.git@v0.1.0"

# Integração com sistemas legados
integracoes-legados: []     # habilidade transversal, sem ligação direta com legados

# Skill no Plugin Maná
skill-publicada: false      # vira true após PR no plugin-mana-skills
url-skill-no-plugin: ""

# ADRs aplicáveis
adrs:
  - 2026-06-19-pseudonimizacao-padrao-llm-e-terceiros   # princípio LGPD/segurança transversal
  - 2026-06-24-plataforma-agentica-mana-5-camadas       # Camada 2C — Habilidades
  - 2026-06-26-mana-builder-matriz-cobertura
  - 2026-06-26-fluxo-criacao-habilidade-mana-builder
  - 2026-06-26-versionamento-distribuicao-mana-builder
  - 2026-06-26-plugin-mana-skills-cowork

# Tags livres pra descoberta
tags: [pseudonimizacao, pii, lgpd, llm-safety, mascarar, anonimizar, cpf, cnpj, dados-pessoais]
